<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f3f6fd; /* Use your preferred background color */
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .app-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .app-name {
      color: #1f1c2e; /* Use your preferred text color */
      font-size: 36px;
      margin: 0;
    }

    .introduction, .projects, .contact {
      margin-bottom: 40px;
    }

    .project-list {
      display: flex;
      flex-wrap: wrap;
    }

    .project-box {
      /* Style project boxes */
      background-color: #fff; /* Use your preferred background color */
      border: 1px solid #e9ebf0; /* Use your preferred border color */
      border-radius: 10px;
      padding: 20px;
      margin: 10px;
    }

    /* Add more styles as needed */
  </style>
  <title>Your Portfolio</title>
</head>
<body>
  <div class="app-container">
    <!-- Header Section -->
    <header class="app-header">
      <h1 class="app-name">Your Name - Portfolio</h1>
      <!-- Add other header elements like navigation, etc. -->
    </header>

    <!-- Main Content Section -->
    <div class="app-content">
      <!-- Introduction Section -->
      <section class="introduction">
        <h2>About Me</h2>
        <p>Write a brief introduction about yourself and your skills.</p>
      </section>

      <!-- Projects Section -->
      <section class="projects">
        <h2>Projects</h2>
        <div class="project-list">
          <!-- Include project boxes here -->
          <div class="project-box">
            <!-- Project details: title, description, links, etc. -->
          </div>
        </div>
      </section>

      <!-- Contact Section -->
      <section class="contact">
        <h2>Contact Me</h2>
        <!-- Add your contact information, social links, etc. -->
      </section>
    </div>
  </div>
</body>
</html>
