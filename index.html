<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой чат с веб-сокетами</title>
    <style>
        #chat {
            height: 300px;
            border: 1px solid #ccc;
            overflow-y: scroll;
        }

        #inputMessage {
            width: 80%;
        }
    </style>
</head>
<body>

<div id="chat"></div>
<input type="text" id="inputMessage" placeholder="Введите сообщение...">
<button onclick="sendMessage()">Отправить</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.1.2/socket.io.js"></script>
<script>
    var socket = io();

    socket.on('message', function(message) {
        appendMessage(message);
    });

    function sendMessage() {
        var messageInput = document.getElementById('inputMessage');
        var message = messageInput.value;

        if (message.trim() !== '') {
            socket.emit('message', 'Вы: ' + message);
            messageInput.value = '';
        }
    }

    function appendMessage(message) {
        var chatDiv = document.getElementById('chat');
        var messageDiv = document.createElement('div');
        messageDiv.textContent = message;
        chatDiv.appendChild(messageDiv);

        // Прокрутка вниз, чтобы видеть последнее сообщение
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
</script>
<script>
    var io = require('socket.io')();

    io.on('connection', function(socket){
        console.log('a user connected');
        socket.on('message', function(message){
            io.emit('message', message);
        });
        socket.on('disconnect', function(){
            console.log('user disconnected');
        });
    });

    io.listen(3000);
</script>
</body>
</html>
