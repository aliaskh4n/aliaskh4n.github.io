
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tg-bg:#efeff4;
  --tg-surface:#ffffff;
  --tg-blue:#2AABEE;
  --tg-blue-dark:#1a8ec9;
  --tg-text:#000000;
  --tg-sub:#8e8e93;
  --tg-sep:#c8c7cc;
  --tg-pill-bg:#e8f4fd;
  --tg-pill-txt:#1a8ec9;
}
@media(prefers-color-scheme:dark){
:root{
  --tg-bg:#1c1c1e;
  --tg-surface:#2c2c2e;
  --tg-blue:#2AABEE;
  --tg-blue-dark:#50baf0;
  --tg-text:#ffffff;
  --tg-sub:#8e8e93;
  --tg-sep:#38383a;
  --tg-pill-bg:#1a3a4e;
  --tg-pill-txt:#50baf0;
}
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--tg-bg);color:var(--tg-text)}
.phone{max-width:380px;margin:0 auto;background:var(--tg-bg);min-height:100vh;padding-bottom:20px}
.topbar{background:var(--tg-surface);padding:12px 16px 0;border-bottom:0.5px solid var(--tg-sep);position:sticky;top:0;z-index:10}
.topbar-title{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--tg-blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar i{color:#fff;font-size:18px}
.title-col{flex:1}
.title-col h1{font-size:16px;font-weight:500;color:var(--tg-text);line-height:1}
.title-col p{font-size:12px;color:var(--tg-sub);margin-top:2px}
.count-badge{background:var(--tg-blue);color:#fff;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.search-wrap{padding:8px 0 10px}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--tg-bg);border-radius:10px;padding:7px 10px}
.search-inner i{font-size:16px;color:var(--tg-sub)}
.search-inner input{border:none;background:transparent;outline:none;font-size:15px;color:var(--tg-text);flex:1;font-family:inherit}
.search-inner input::placeholder{color:var(--tg-sub)}
.cats{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;font-size:13px;padding:5px 13px;border-radius:16px;border:1px solid var(--tg-sep);background:var(--tg-surface);color:var(--tg-sub);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat.on{background:var(--tg-blue);border-color:var(--tg-blue);color:#fff;font-weight:500}
.section-header{font-size:13px;font-weight:500;color:var(--tg-sub);padding:14px 16px 6px;text-transform:uppercase;letter-spacing:.5px}
.list{background:var(--tg-surface);border-radius:0;overflow:hidden;margin:0}
.item{padding:12px 16px;border-bottom:0.5px solid var(--tg-sep);cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:12px}
.item:last-child{border-bottom:none}
.item:active{background:var(--tg-bg)}
.item-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.item-body{flex:1;min-width:0}
.item-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:2px}
.item-name{font-size:15px;font-weight:500;color:var(--tg-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-abv{font-size:12px;color:var(--tg-blue);flex-shrink:0;font-weight:500}
.item-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.item-method{font-size:12px;color:var(--tg-sub)}
.item-dot{width:3px;height:3px;border-radius:50%;background:var(--tg-sep);flex-shrink:0}
.item-base-pill{font-size:11px;color:var(--tg-pill-txt);background:var(--tg-pill-bg);padding:1px 7px;border-radius:8px;font-weight:500}
.item-ing{font-size:13px;color:var(--tg-sub);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item.expanded .item-ing{white-space:normal;overflow:visible}
.empty{text-align:center;padding:40px 20px;color:var(--tg-sub);font-size:15px}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.4}
.group{margin-top:2px}

.ic-v{background:#e8f4fd;color:#1a8ec9}
.ic-r{background:#fdecea;color:#c0392b}
.ic-w{background:#fef3e2;color:#b7770d}
.ic-g{background:#e8f8ef;color:#1a7a45}
.ic-t{background:#f0ebfe;color:#6c3fbf}
.ic-c{background:#fde8f0;color:#b5267a}
.ic-l{background:#e2f5f1;color:#0e7a5f}
.ic-a{background:#fef0e6;color:#c96a1a}
.ic-m{background:#eef0fe;color:#3a4abf}
@media(prefers-color-scheme:dark){
.ic-v{background:#1a3a4e;color:#50baf0}
.ic-r{background:#3e1a18;color:#e87e7a}
.ic-w{background:#3a2a0a;color:#e8b84b}
.ic-g{background:#0f2e1a;color:#4ec97a}

.ic-l{background:#052920;color:#3dd9a8}
.ic-a{background:#3a2010;color:#e89a55}
.ic-m{background:#12153e;color:#818dea}
}
</style>

{n:"Jungle Juice",b:"Микс",c:"m",abv:"12%",m:"Батч",i:"Водка 50 мл, ром 30 мл, ананас. сок 90 мл, апельс. сок 90 мл, клюкв. сок 60 мл, лимонад"},
{n:"Tuxedo",b:"Аперитив",c:"m",abv:"25%",m:"Стир",i:"Джин 45 мл, сухой вермут 45 мл, Maraschino 5 мл, абсент 3 дэша, апельс. биттерс"},
];

const ICONS={v:"ti-droplet",r:"ti-sail",w:"ti-flame",g:"ti-leaf",t:"ti-sun",c:"ti-grapes",l:"ti-candy",a:"ti-glass-champagne",m:"ti-circles"};
const CATS=[
  {k:"all",l:"Все"},
  {k:"v",l:"Водка"},
  {k:"r",l:"Ром"},
  {k:"w",l:"Виски"},
  {k:"g",l:"Джин"},
  {k:"t",l:"Текила"},
  {k:"c",l:"Коньяк"},
  {k:"l",l:"Ликёры"},
  {k:"a",l:"Игристые"},
  {k:"m",l:"Микс"},
];

const GROUPS={v:"Водка",r:"Ром",w:"Виски",g:"Джин",t:"Текила",c:"Коньяк",l:"Ликёры / аперитивы",a:"Шампанское / игристые",m:"Микс"};
let active="all";
const expanded=new Set();

const catsEl=document.getElementById("cats");
CATS.forEach(({k,l})=>{
  const b=document.createElement("button");
  b.className="cat"+(k==="all"?" on":"");
  b.textContent=l;
  b.onclick=()=>{active=k;document.querySelectorAll(".cat").forEach(x=>x.classList.remove("on"));b.classList.add("on");render()};
  catsEl.appendChild(b);
});

function render(){
  const q=document.getElementById("s").value.toLowerCase();
  const list=D.filter(c=>{
    const mc=active==="all"||c.c===active;
    const mq=!q||c.n.toLowerCase().includes(q)||c.i.toLowerCase().includes(q)||c.b.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById("badge").textContent=list.length;
  const out=document.getElementById("out");
  if(!list.length){out.innerHTML='<div class="empty"><i class="ti ti-glass-off" aria-hidden="true"></i>Ничего не найдено</div>';return;}

  const grouped={};
  list.forEach(c=>{(grouped[c.c]=grouped[c.c]||[]).push(c)});

  let html="";
  Object.entries(grouped).forEach(([cat,items])=>{
    const showHeader=active==="all"&&!q;
    if(showHeader) html+=`<div class="section-header">${GROUPS[cat]||cat}</div>`;
    html+=`<div class="list">`;
    items.forEach((c,idx)=>{
      const isExp=expanded.has(c.n);
      html+=`<div class="item${isExp?" expanded":""}" onclick="toggle('${c.n.replace(/'/g,"\\'")}')">
        <div class="item-icon ic-${c.c}"><i class="ti ${ICONS[c.c]||'ti-bottle'}" aria-hidden="true"></i></div>
        <div class="item-body">
          <div class="item-top">
            <span class="item-name">${c.n}</span>
            <span class="item-abv">${c.abv}</span>
          </div>
          <div class="item-meta">
            <span class="item-base-pill">${c.b}</span>
            <span class="item-dot"></span>
            <span class="item-method">${c.m}</span>
          </div>
          <div class="item-ing">${c.i}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
    if(showHeader) html+=`<div style="height:8px"></div>`;
  });
  out.innerHTML=html;
}

function toggle(name){
  if(expanded.has(name)) expanded.delete(name);
  else expanded.add(name);
  render();
}

render();
</script>
